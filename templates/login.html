<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>CV Scanner — Login</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f5f6fa;--surface:#ffffff;--border:#e2e5ed;
      --accent:#2563eb;--text:#111827;--muted:#6b7280;
      --red:#dc2626;--shadow:0 4px 24px rgba(0,0,0,.08);
    }
    body{
      background:var(--bg);color:var(--text);
      font-family:'Inter',system-ui,sans-serif;
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:
        radial-gradient(ellipse at 0% 0%,rgba(37,99,235,.07) 0%,transparent 60%),
        radial-gradient(ellipse at 100% 100%,rgba(124,58,237,.05) 0%,transparent 60%),
        #f5f6fa;
    }
    .card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:16px;padding:40px 36px;width:100%;max-width:380px;
      box-shadow:var(--shadow);
    }
    .logo{text-align:center;margin-bottom:32px}
    .logo-tag{font-size:10px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;font-weight:700;margin-bottom:8px}
    .logo h1{font-size:32px;font-weight:900;letter-spacing:-1.5px}
    .logo h1 span{color:var(--accent)}
    .logo p{font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:.3px}

    label{display:block;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
    input{
      width:100%;padding:11px 14px;border:1.5px solid var(--border);
      border-radius:8px;font-size:14px;font-family:inherit;
      background:#fafafa;color:var(--text);outline:none;
      transition:border-color .2s,box-shadow .2s;
    }
    input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1);background:#fff}
    .field{margin-bottom:18px}

    .btn{
      width:100%;padding:13px;background:var(--accent);color:#fff;
      border:none;border-radius:9px;font-size:14px;font-weight:700;
      font-family:inherit;cursor:pointer;margin-top:8px;
      transition:opacity .2s,transform .1s;letter-spacing:.3px;
    }
    .btn:hover{opacity:.9}
    .btn:active{transform:scale(.99)}

    .error{
      background:rgba(220,38,38,.06);border:1.5px solid rgba(220,38,38,.2);
      color:var(--red);border-radius:8px;padding:10px 14px;
      font-size:12px;font-weight:500;margin-bottom:18px;text-align:center;
    }

    .footer{text-align:center;margin-top:24px;font-size:10px;color:var(--muted);letter-spacing:1px}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-tag">sistem analiză cv · powered by claude ai</div>
      <h1>CV<span>.</span>scanner</h1>
      <p>autentificare necesară</p>
    </div>

    {% if error %}
    <div class="error">⚠ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="field">
        <label>Utilizator</label>
        <input type="text" name="username" placeholder="username" autocomplete="username" autofocus required/>
      </div>
      <div class="field">
        <label>Parolă</label>
        <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required/>
      </div>
      <button class="btn" type="submit">→ Intră în aplicație</button>
    </form>

    <div class="footer">cv.scanner · acces restricționat</div>
  </div>
</body>
</html>
