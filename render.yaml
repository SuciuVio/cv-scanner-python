services:
  - type: web
    name: cv-scanner
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 120 --workers 2 --worker-class gevent
    envVars:
      - key: CLAUDE_API_KEY
        sync: false        # o introduci manual în Render dashboard
      - key: FLASK_ENV
        value: production